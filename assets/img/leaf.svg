<?xml version="1.0" encoding="UTF-8"?>
<!-- Ẑelkova — Feuille de Zelkova stylisée (logo principal) -->
<!-- Charte: violet #7B5EA7, vert #2E8B57, or #DAA520            -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E8B57;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1F6B42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B5EA7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="veinGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DAA520;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:0.4" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000040"/>
    </filter>
  </defs>

  <!-- Feuille de Zelkova — forme ovale dentelée caractéristique -->
  <!-- La feuille de Zelkova est ovale, asymétrique à la base, avec dents régulières -->
  <path d="
    M 100 18
    C 118 20, 148 35, 160 60
    C 168 78, 168 95, 162 112
    C 158 120, 150 130, 140 138
    C 136 142, 130 148, 128 152
    C 126 156, 124 162, 120 166
    C 116 170, 112 175, 108 180
    C 106 182, 104 184, 100 185
    C 96 184, 94 182, 92 180
    C 88 175, 84 170, 80 166
    C 76 162, 74 156, 72 152
    C 70 148, 64 142, 60 138
    C 50 130, 42 120, 38 112
    C 32 95, 32 78, 40 60
    C 52 35, 82 20, 100 18 Z
  " fill="url(#leafGrad)" filter="url(#shadow)" />

  <!-- Dentelure de la feuille (dents caractéristiques du Zelkova) -->
  <path d="
    M 100 18
    C 110 22, 130 32, 148 50
    L 143 48 L 155 58 L 148 56
    C 164 78, 166 100, 158 118
    L 153 113 L 162 124 L 155 122
    C 148 134, 136 144, 126 154
    L 120 148 L 128 158 L 122 156
    C 116 166, 108 176, 100 185
    C 92 176, 84 166, 78 156
    L 72 158 L 80 148 L 74 154
    C 64 144, 52 134, 45 122
    L 38 124 L 47 113 L 42 118
    C 34 100, 36 78, 52 58
    L 45 56 L 57 48 L 52 50
    C 70 32, 90 22, 100 18 Z
  " fill="none" stroke="#1A5E38" stroke-width="0.5" opacity="0.3" />

  <!-- Nervure centrale (pétiole) -->
  <path d="M 100 185 L 100 40"
    stroke="url(#veinGrad)" stroke-width="2.5" fill="none"
    stroke-linecap="round" />

  <!-- Nervures latérales — typiques du Zelkova (parallèles et régulières) -->
  <g stroke="#DAA520" stroke-width="1.2" fill="none" opacity="0.7" stroke-linecap="round">
    <path d="M 100 65  C 82 62, 58 64, 48 70" />
    <path d="M 100 65  C 118 62, 142 64, 152 70" />
    <path d="M 100 82  C 80 78, 54 78, 42 86" />
    <path d="M 100 82  C 120 78, 146 78, 158 86" />
    <path d="M 100 100 C 80 96, 52 94, 40 102" />
    <path d="M 100 100 C 120 96, 148 94, 160 102" />
    <path d="M 100 118 C 82 114, 58 112, 48 120" />
    <path d="M 100 118 C 118 114, 142 112, 152 120" />
    <path d="M 100 136 C 85 132, 66 130, 58 138" />
    <path d="M 100 136 C 115 132, 134 130, 142 138" />
    <path d="M 100 152 C 88 148, 74 148, 68 154" />
    <path d="M 100 152 C 112 148, 126 148, 132 154" />
  </g>

  <!-- Lettre Ẑ au centre (symbole ẐEN) -->
  <text x="100" y="115" text-anchor="middle"
    font-family="Nunito, Arial, sans-serif"
    font-weight="900" font-size="38"
    fill="#ffffff" opacity="0.92"
    filter="url(#shadow)">Ẑ</text>
</svg>
