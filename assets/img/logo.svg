<?xml version="1.0" encoding="UTF-8"?>
<!-- Ẑelkova — Logo horizontal: feuille + texte -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="leafG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E8B57;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#1F6B42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B5EA7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1F6B42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B5EA7;stop-opacity:1" />
    </linearGradient>
    <filter id="leafShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Feuille de Zelkova (version miniature 100x100, centrée en y=10..110) -->
  <g transform="translate(10, 10) scale(0.5)">
    <path d="
      M 100 18
      C 118 20, 148 35, 160 60
      C 168 78, 168 95, 162 112
      C 158 120, 150 130, 140 138
      C 136 142, 130 148, 128 152
      C 126 156, 124 162, 120 166
      C 116 170, 112 175, 108 180
      C 106 182, 104 184, 100 185
      C 96 184, 94 182, 92 180
      C 88 175, 84 170, 80 166
      C 76 162, 74 156, 72 152
      C 70 148, 64 142, 60 138
      C 50 130, 42 120, 38 112
      C 32 95, 32 78, 40 60
      C 52 35, 82 20, 100 18 Z
    " fill="url(#leafG)" filter="url(#leafShadow)" />
    <!-- Nervure centrale -->
    <path d="M 100 185 L 100 40"
      stroke="#DAA520" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8" />
    <!-- Nervures latérales -->
    <g stroke="#DAA520" stroke-width="1.2" fill="none" opacity="0.6" stroke-linecap="round">
      <path d="M 100 65  C 82 62, 58 64, 48 70" />
      <path d="M 100 65  C 118 62, 142 64, 152 70" />
      <path d="M 100 82  C 80 78, 54 78, 42 86" />
      <path d="M 100 82  C 120 78, 146 78, 158 86" />
      <path d="M 100 100 C 80 96, 52 94, 40 102" />
      <path d="M 100 100 C 120 96, 148 94, 160 102" />
      <path d="M 100 118 C 82 114, 58 112, 48 120" />
      <path d="M 100 118 C 118 114, 142 112, 152 120" />
    </g>
    <!-- Ẑ -->
    <text x="100" y="115" text-anchor="middle"
      font-family="Nunito, Arial, sans-serif" font-weight="900" font-size="40"
      fill="#ffffff" opacity="0.95">Ẑ</text>
  </g>

  <!-- Texte "elkova" (le Ẑ est dans la feuille) -->
  <text x="126" y="78"
    font-family="Nunito, Arial, sans-serif" font-weight="700" font-size="52"
    fill="url(#textG)" letter-spacing="-1">elkova</text>

  <!-- Point ẐEN sous le texte (petite feuille décorative) -->
  <circle cx="480" cy="70" r="0" fill="none" />
</svg>
