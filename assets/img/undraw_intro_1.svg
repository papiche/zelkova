<?xml version="1.0" encoding="UTF-8"?>
<!-- Intro 1: Créer un MULTIPASS — Identité numérique NOSTR -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F4FF"/>
      <stop offset="100%" style="stop-color:#EDE8FF"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B5EA7"/>
      <stop offset="100%" style="stop-color:#2E8B57"/>
    </linearGradient>
  </defs>
  <!-- Fond -->
  <rect width="400" height="300" fill="url(#bg1)" rx="16"/>
  <!-- Carte MULTIPASS -->
  <rect x="80" y="60" width="240" height="150" rx="16" fill="url(#card1)" opacity="0.92"/>
  <!-- Chip -->
  <rect x="100" y="90" width="40" height="30" rx="5" fill="#DAA520" opacity="0.9"/>
  <!-- Lignes du chip -->
  <line x1="110" y1="90" x2="110" y2="120" stroke="#B8860B" stroke-width="1"/>
  <line x1="120" y1="90" x2="120" y2="120" stroke="#B8860B" stroke-width="1"/>
  <line x1="130" y1="90" x2="130" y2="120" stroke="#B8860B" stroke-width="1"/>
  <!-- Feuille Zelkova sur la carte -->
  <text x="290" y="102" font-family="Arial" font-size="28" fill="white" opacity="0.7">Ẑ</text>
  <!-- Ligne pubkey -->
  <rect x="100" y="135" width="180" height="8" rx="4" fill="white" opacity="0.4"/>
  <rect x="100" y="152" width="120" height="6" rx="3" fill="white" opacity="0.3"/>
  <!-- Label MULTIPASS -->
  <text x="200" y="195" text-anchor="middle" font-family="Nunito, Arial" font-size="13"
    fill="white" font-weight="700" letter-spacing="2">MULTIPASS</text>
  <!-- Texte en bas -->
  <text x="200" y="245" text-anchor="middle" font-family="Nunito, Arial" font-size="16"
    fill="#7B5EA7" font-weight="700">Votre identité ẐEN</text>
  <text x="200" y="268" text-anchor="middle" font-family="Arial" font-size="12"
    fill="#666">Compte NOSTR · Toile de confiance Ğ1</text>
</svg>
