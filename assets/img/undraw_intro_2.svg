<?xml version="1.0" encoding="UTF-8"?>
<!-- Intro 2: Payer en ẐEN entre MULTIPASS -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FFF4"/><stop offset="100%" style="stop-color:#E8F5E9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg2)" rx="16"/>
  <!-- Téléphone gauche (payeur) -->
  <rect x="40" y="80" width="90" height="150" rx="12" fill="#7B5EA7"/>
  <rect x="48" y="95" width="74" height="110" rx="6" fill="#EDE8FF"/>
  <circle cx="85" cy="210" r="7" fill="#9B7CC7"/>
  <text x="85" y="162" text-anchor="middle" font-family="Arial" font-size="22" fill="#7B5EA7" font-weight="bold">-Ẑ</text>
  <text x="85" y="178" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">MULTIPASS</text>
  <!-- Flèche centrale animée -->
  <path d="M 145 155 L 255 155" stroke="#DAA520" stroke-width="3" stroke-dasharray="8,4"/>
  <polygon points="255,150 255,160 268,155" fill="#DAA520"/>
  <!-- Symbole ẐEN -->
  <circle cx="200" cy="155" r="20" fill="#DAA520" opacity="0.15"/>
  <text x="200" y="162" text-anchor="middle" font-family="Arial" font-size="20" fill="#DAA520" font-weight="bold">Ẑ</text>
  <!-- Téléphone droit (receveur) -->
  <rect x="270" y="80" width="90" height="150" rx="12" fill="#2E8B57"/>
  <rect x="278" y="95" width="74" height="110" rx="6" fill="#E8F5E9"/>
  <circle cx="315" cy="210" r="7" fill="#4CAF50"/>
  <text x="315" y="162" text-anchor="middle" font-family="Arial" font-size="22" fill="#2E8B57" font-weight="bold">+Ẑ</text>
  <text x="315" y="178" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">MULTIPASS</text>
  <!-- Texte -->
  <text x="200" y="260" text-anchor="middle" font-family="Nunito, Arial" font-size="16" fill="#2E8B57" font-weight="700">Paiement ẐEN instantané</text>
  <text x="200" y="280" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Uniquement entre MULTIPASS</text>
</svg>
