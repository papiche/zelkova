<?xml version="1.0" encoding="UTF-8"?>
<!-- Intro 4: Toile de confiance Ğ1 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#F0FFF4" rx="16"/>
  <!-- Toile (web of trust) -->
  <circle cx="200" cy="130" r="22" fill="#2E8B57"/>
  <text x="200" y="137" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">Vous</text>
  <circle cx="130" cy="75" r="18" fill="#4CAF50" opacity="0.85"/>
  <circle cx="270" cy="75" r="18" fill="#4CAF50" opacity="0.85"/>
  <circle cx="100" cy="170" r="18" fill="#4CAF50" opacity="0.85"/>
  <circle cx="300" cy="170" r="18" fill="#4CAF50" opacity="0.85"/>
  <circle cx="200" cy="210" r="18" fill="#8BC34A" opacity="0.7"/>
  <!-- Certifications (flèches doubles) -->
  <line x1="200" y1="130" x2="130" y2="75" stroke="#2E8B57" stroke-width="2.5"/>
  <line x1="200" y1="130" x2="270" y2="75" stroke="#2E8B57" stroke-width="2.5"/>
  <line x1="200" y1="130" x2="100" y2="170" stroke="#2E8B57" stroke-width="2.5"/>
  <line x1="200" y1="130" x2="300" y2="170" stroke="#2E8B57" stroke-width="2.5"/>
  <line x1="130" y1="75" x2="270" y2="75" stroke="#81C784" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="170" x2="300" y2="170" stroke="#81C784" stroke-width="1.5" opacity="0.6"/>
  <!-- Coeurs de certification -->
  <text x="130" y="80" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Ğ1</text>
  <text x="270" y="80" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Ğ1</text>
  <text x="100" y="175" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Ğ1</text>
  <text x="300" y="175" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Ğ1</text>
  <!-- Texte -->
  <text x="200" y="258" text-anchor="middle" font-family="Nunito, Arial" font-size="16" fill="#2E8B57" font-weight="700">Toile de confiance Ğ1</text>
  <text x="200" y="278" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Certifications mutuelles · Monnaie Libre Duniter</text>
