<?xml version="1.0" encoding="UTF-8"?>
<!-- Intro 5: Souveraineté numérique -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B5EA7"/><stop offset="100%" style="stop-color:#2E8B57"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#F8F4FF" rx="16"/>
  <!-- Bouclier souveraineté -->
  <path d="M200 50 L280 90 L280 160 C280 200 200 235 200 235 C200 235 120 200 120 160 L120 90 Z"
    fill="url(#shield)" opacity="0.9"/>
  <!-- Intérieur du bouclier -->
  <path d="M200 68 L262 100 L262 158 C262 190 200 218 200 218 C200 218 138 190 138 158 L138 100 Z"
    fill="white" opacity="0.15"/>
  <!-- Feuille Zelkova dans le bouclier -->
  <text x="200" y="162" text-anchor="middle" font-family="Nunito, Arial" font-size="56"
    fill="white" font-weight="900" opacity="0.95">Ẑ</text>
  <!-- Étoiles / éléments décoratifs -->
  <circle cx="80" cy="100" r="4" fill="#DAA520" opacity="0.6"/>
  <circle cx="320" cy="100" r="4" fill="#DAA520" opacity="0.6"/>
  <circle cx="60" cy="160" r="3" fill="#7B5EA7" opacity="0.5"/>
  <circle cx="340" cy="160" r="3" fill="#7B5EA7" opacity="0.5"/>
  <circle cx="90" cy="200" r="5" fill="#2E8B57" opacity="0.4"/>
  <circle cx="310" cy="200" r="5" fill="#2E8B57" opacity="0.4"/>
  <!-- Texte -->
  <text x="200" y="260" text-anchor="middle" font-family="Nunito, Arial" font-size="16"
    fill="#7B5EA7" font-weight="700">Souveraineté numérique</text>
  <text x="200" y="280" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Logiciels libres · Zéro dépendance centrale</text>
</svg>
