services:
  zelkova:
    image: comunes/zelkova:latest
    build:
      context: .
    container_name: zelkova
    restart: always
    ports:
      - "${ZELKOVA_PORT:-1801}:80"
    environment:
      - TZ=${TZ:-Europe/Copenhagen}
      # Sentry
      - SENTRY_DSN=${SENTRY_DSN:-}
      # Card customization
      - CARD_TEXT=${CARD_TEXT:-Ğ1 Wallet}
      - CARD_COLOR_LEFT=${CARD_COLOR_LEFT:-}
      - CARD_COLOR_RIGHT=${CARD_COLOR_RIGHT:-}
      # Nodes (space-separated)
      - DUNITER_NODES=${DUNITER_NODES:-https://g1.duniter.fr https://g1.le-sou.org https://g1.cgeek.fr https://g1.monnaielibreoccitanie.org}
      - CESIUM_PLUS_NODES=${CESIUM_PLUS_NODES:-https://g1.data.le-sou.org https://g1.data.e-is.pro https://g1.data.presles.fr https://g1.data.mithril.re}
      - GVA_NODES=${GVA_NODES:-https://g1v1.p2p.legal:443/gva https://g1.asycn.io:443/gva https://duniter.pini.fr:443/gva}
