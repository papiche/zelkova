query AccountsByNameOrPk($pattern: String) {
    identity(
        where: {
            _or: [
                { name: { _iregex: $pattern } }
                { accountId: { _iregex: $pattern } }
            ]
        }
    ) {
        isMember
        name
        accountId
        status
        createdOn
        account {
            isActive
        }
        index
    }
}

query AccountByPk ($id: String!)  {
    accountByPk(id: $id) {
        isActive
    }
}


query LastBlock {
    block(limit: 1, orderBy: {timestamp: DESC}) {
        height
    }
}

