query AccountsByNameOrPk($pattern: String) {
    identity(
        where: {
            _or: [
                { name: { _iregex: $pattern } }
                { accountId: { _iregex: $pattern } }
            ]
        }
    ) {
        isMember
        name
        accountId
        status
        createdOn
        account {
            isActive
        }
        index
    }
}

query AccountsByName($pattern: String) {
    identity(
        where:
        { name: { _iregex: $pattern } }
    ) {
        isMember
        name
        accountId
        status
        createdOn
        account {
            isActive
        }
        index
    }
}


query AccountByPk ($id: String!)  {
    accountByPk(id: $id) {
        isActive
    }
}


query LastBlock {
    block(limit: 1, orderBy: {timestamp: DESC}) {
        height
    }
}

query GetHistoryAndBalance($accountId: String!, $limit: Int, $offset: Int) {
    account(where: { id: { _eq: $accountId } }) {
        id
        transfersIssued(limit: $limit, offset: $offset, orderBy: { timestamp: DESC }) {
            blockNumber
            timestamp
            amount
            to {
                id
            }
            from {
                id
            }
            comment {
                remark
            }
        }
        transfersReceived(limit: $limit, offset: $offset, orderBy: { timestamp: DESC }) {
            blockNumber
            timestamp
            amount
            from {
                id
            }
            to {
                id
            }
            comment {
                remark
            }
        }
    }
}
