query LastBlock {
    block(limit: 1, orderBy: {timestamp: DESC}) {
        height
    }
}

fragment CertFields on Cert {
    id
    issuerId
    issuer {
        ...IdentityBasicFields
    }
    receiverId
    receiver {
        ...IdentityBasicFields
    }
    createdOn
    expireOn
    isActive
    updatedOn
}

fragment SmithCertFields on SmithCert {
    id
    issuerId
    receiverId
    createdOn
}


fragment SmithFields on Smith {
    id
    forged
    index
    lastChanged
    lastForged
    smithCertIssued {
        ...SmithCertFields
    }
    smithCertReceived {
        ...SmithCertFields
    }
}

fragment OwnerKeyChangeFields on ChangeOwnerKey {
    id
    blockNumber
    identityId
    nextId
    previousId
}

fragment IdentityBasicFields on Identity {
    accountId
    account {
        createdOn
    }
    id
    isMember
    status
    name
    status
    expireOn
}

fragment IdentityFields on Identity {
    account {
        createdOn
    }
    accountId
    accountRemovedId
    certIssued (where: { isActive: { _eq: true } }) {
        ...CertFields
    }
    certIssuedAggregate (where: { isActive: { _eq: true } }) {
        aggregate {
            count
        }
    }
    certReceived (where: { isActive: { _eq: true } }) {
        ...CertFields
    }
    certReceivedAggregate (where: { isActive: { _eq: true } }) {
        aggregate {
            count
        }
    }
    createdInId
    createdOn
    expireOn
    id
    index
    isMember
    lastChangeOn
    linkedAccount {
        id
        #     ...AccountFields
    }
    linkedAccountAggregate {
        aggregate {
            count
        }
    }
    status
    membershipHistory {
        blockNumber
        eventId
        eventType
        id
        identityId
    }
    membershipHistoryAggregate {
        aggregate {
            count
        }
    }
    name
    ownerKeyChange {
        ...OwnerKeyChangeFields
    }
    ownerKeyChangeAggregate {
        aggregate {
            count
        }
    }
    status
    smith {
        ...SmithFields
    }
    udHistory {
        id
        amount
        timestamp
    }
}

fragment CommentsIssued on TxComment {
    authorId
    blockNumber
    eventId
    hash
    id
    remark
    type
}


fragment AccountBasicFields on Account {
    createdOn
    id
    identity {
        ...IdentityBasicFields
    }
    isActive
}

fragment AccountFields on Account {
    commentsIssued {
        ...CommentsIssued
    }
    commentsIssuedAggregate {
        aggregate {
            count
        }
    }
    createdOn
    id
    identity {
        ...IdentityFields
    }
    isActive
    linkedIdentity {
        ...IdentityBasicFields
    }
    removedIdentities {
        ...IdentityBasicFields
    }
    removedIdentitiesAggregate {
        aggregate {
            count
        }
    }
    transfersIssued(limit: $limit, offset: $offset, orderBy: { timestamp: DESC }) {
        ...TransferFields
    }
    transfersIssuedAggregate {
        aggregate {
            sum {
                amount
            }
            count
        }
    }
    transfersReceived(limit: $limit, offset: $offset, orderBy: { timestamp: DESC }) {
        ...TransferFields
    }
    transfersReceivedAggregate {
        aggregate {
            sum {
                amount
            }
            count
        }
    }
    wasIdentity {
        ...OwnerKeyChangeFields
    }
    wasIdentityAggregate {
        aggregate {
            count
        }
    }
}

fragment AccountTxsFields on Account {
    commentsIssued {
        ...CommentsIssued
    }
    commentsIssuedAggregate {
        aggregate {
            count
        }
    }
    createdOn
    id
    isActive
    transfersIssued(limit: $limit, offset: $offset, orderBy: { timestamp: DESC }) {
        ...TransferFields
    }
    transfersIssuedAggregate {
        aggregate {
            sum {
                amount
            }
            count
        }
    }
    transfersReceived(limit: $limit, offset: $offset, orderBy: { timestamp: DESC }) {
        ...TransferFields
    }
    transfersReceivedAggregate {
        aggregate {
            sum {
                amount
            }
            count
        }
    }
}


fragment TransferFields on Transfer {
    blockNumber
    timestamp
    amount
    to {
        id
    }
    from {
        id
    }
    comment {
        remark
    }
}

query IdentitiesByNameOrPk($pattern: String) {
    identity(
        where: {
            _or: [
                { name: { _iregex: $pattern } }
                { accountId: { _iregex: $pattern } }
            ]
        }
    ) {
        ...IdentityBasicFields
    }
}

query IdentitiesByPk($pubKeys: [String!]!) {
    identity(where: { accountId: { _in: $pubKeys } }) {
        ...IdentityFields
    }
}

query IdentitiesByName($pattern: String) {
    identity(where: { name: { _iregex: $pattern } }) {
        ...IdentityFields
    }
}

query AccountByPk($id: String!, $limit: Int, $offset: Int) {
    accountByPk(id: $id) {
        ...AccountFields
    }
}

query AccountsByPk($accountIds: [String!]!, $limit: Int, $offset: Int) {
    account(where: { id: { _in: $accountIds } }) {
        ...AccountFields
    }
}

query AccountBasicByPk($id: String!) {
    accountByPk(id: $id) {
        ...AccountBasicFields
    }
}

query AccountsBasicByPk($accountIds: [String!]!, $limit: Int, $offset: Int) {
    account(where: { id: { _in: $accountIds } }) {
        ...AccountBasicFields
    }
}

query AccountTransactions($accountId: String!, $limit: Int, $offset: Int) {
    account(where: { id: { _eq: $accountId } }) {
        ...AccountTxsFields
    }
}
