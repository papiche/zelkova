    <title>Ẑelkova</title>
    <link href="manifest.json" rel="manifest">

    <style>
        html, body {
          margin: 0;
          padding: 0;
          background: #0d1117;
          overflow: hidden;
        }
        #goldberg-splash {
          position: fixed;
          inset: 0;
          width: 100%;
          height: 100%;
        }
        #splash-ui {
          position: fixed;
          left: 0; right: 0;
          bottom: 18%;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 10px;
          pointer-events: none;
        }
        #splash-title {
          font-family: system-ui, -apple-system, sans-serif;
          font-size: 1.5rem;
          font-weight: 800;
          letter-spacing: -0.5px;
          color: rgba(255,255,255,0.82);
        }
        #splash-track {
          width: 100px;
          height: 2px;
          background: rgba(255,255,255,0.08);
          border-radius: 1px;
          overflow: hidden;
        }
        #splash-thumb {
          height: 100%;
          width: 30%;
          background: rgba(0,188,212,0.65);
          border-radius: 1px;
          animation: thumb-slide 1.4s ease-in-out infinite;
        }
        @keyframes thumb-slide {
          0%   { transform: translateX(-100%); }
          50%  { transform: translateX(233%);  }
          100% { transform: translateX(-100%); }
        }
    </style>
    <!-- Capture PWA install prompt event and define callbacks required by pwa_install package -->
    <script>
        let deferredPrompt;

        // Placeholder callback functions for pwa_install package
        // These must be defined BEFORE the package tries to use them
        function appInstalled() {
          console.log('[PWA] App installed');
        }

        function appLaunchedInBrowser() {
          console.log('[PWA] Launched in browser');
        }

        function appLaunchedAsPWA() {
          console.log('[PWA] Launched as PWA');
        }

        function appLaunchedAsTWA() {
          console.log('[PWA] Launched as TWA (Android)');
        }

        // Track how PWA was launched (either from browser or as PWA)
        // This function is called by the pwa_install Dart package
        function getLaunchMode() {
          const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
          if (document.referrer.startsWith('android-app://')) {
            appLaunchedAsTWA();
          } else if (navigator.standalone || isStandalone) {
            appLaunchedAsPWA();
          } else {
            appLaunchedInBrowser();
          }
        }

        function promptInstall(){
           if (deferredPrompt) {
             deferredPrompt.prompt();
           }
        }

        // Listen for beforeinstallprompt event
        window.addEventListener('beforeinstallprompt', (e) => {
          deferredPrompt = e;
        });

        // Listen for app install event
        window.addEventListener('appinstalled', () => {
          deferredPrompt = null;
          appInstalled();
        });
    </script>
</head>
<body>
<script async src="flutter_bootstrap.js"></script>

<!-- Splash HTML : visible avant que le moteur Flutter démarre -->
<canvas id="goldberg-splash"></canvas>
<div id="splash-ui">
  <div id="splash-title">Ẑelkova</div>
  <div id="splash-track"><div id="splash-thumb"></div></div>
</div>

<script>
// Sphère de Goldberg — icosaèdre fréquence 2 — 42 sommets, 120 arêtes
(function () {
  'use strict';
  var C   = document.getElementById('goldberg-splash');
  var ctx = C.getContext('2d');

  // 12 sommets de l'icosaèdre (normalisés)
  var icoV = [
    [ 0.000,  0.000,  1.000], [ 0.894,  0.000,  0.447], [ 0.276,  0.851,  0.447],
    [-0.724,  0.526,  0.447], [-0.724, -0.526,  0.447], [ 0.276, -0.851,  0.447],
    [ 0.724,  0.526, -0.447], [-0.276,  0.851, -0.447], [-0.894,  0.000, -0.447],
    [-0.276, -0.851, -0.447], [ 0.724, -0.526, -0.447], [ 0.000,  0.000, -1.000]
  ];
  // 20 faces
  var icoF = [
    [0,1,2],[0,2,3],[0,3,4],[0,4,5],[0,5,1],
    [1,6,2],[2,6,7],[2,7,3],[3,7,8],[3,8,4],[4,8,9],[4,9,5],[5,9,10],[5,10,1],[1,10,6],
    [11,7,6],[11,8,7],[11,9,8],[11,10,9],[11,6,10]
  ];

  // Subdivision fréquence-2 : milieux normalisés sur la sphère
  var verts = icoV.map(function(v){ return [v[0],v[1],v[2]]; });
  var midCache = {};

  function getMid(a, b) {
    var key = a < b ? a+'_'+b : b+'_'+a;
    if (key in midCache) return midCache[key];
    var m = [(verts[a][0]+verts[b][0])/2, (verts[a][1]+verts[b][1])/2, (verts[a][2]+verts[b][2])/2];
    var n = Math.sqrt(m[0]*m[0]+m[1]*m[1]+m[2]*m[2]);
    verts.push([m[0]/n, m[1]/n, m[2]/n]);
    return midCache[key] = verts.length - 1;
  }

  var edgeSet = {};
  function addEdge(a, b) {
    var key = a < b ? a+'_'+b : b+'_'+a;
    edgeSet[key] = true;
  }
  for (var fi = 0; fi < icoF.length; fi++) {
    var f = icoF[fi];
    var ab = getMid(f[0],f[1]), bc = getMid(f[1],f[2]), ca = getMid(f[2],f[0]);
    addEdge(f[0],ab); addEdge(ab,f[1]);
    addEdge(f[1],bc); addEdge(bc,f[2]);
    addEdge(f[2],ca); addEdge(ca,f[0]);
    addEdge(ab,bc); addEdge(bc,ca); addEdge(ca,ab);
  }
  var edges = Object.keys(edgeSet).map(function(k){ var p=k.split('_'); return [+p[0],+p[1]]; });

  var t = 0, raf = null, active = true;

  function resize() {
    var dpr = window.devicePixelRatio || 1;
    C.width  = window.innerWidth  * dpr;
    C.height = window.innerHeight * dpr;
    C.style.width  = window.innerWidth  + 'px';
    C.style.height = window.innerHeight + 'px';
  }

  function frame() {
    if (!active) return;
    t += 0.00055;

    var dpr = window.devicePixelRatio || 1;
    var W = C.width / dpr, H = C.height / dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // Fond sombre
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, W, H);

    var cx = W / 2, cy = H / 2;
    var r  = Math.min(W, H) * 0.3;

    var ry = t * 2 * Math.PI;
    var rx = 0.35;
    var rz = Math.sin(t * Math.PI * 0.4) * 0.12;

    var cY = Math.cos(ry), sY = Math.sin(ry);
    var cX = Math.cos(rx), sX = Math.sin(rx);
    var cZ = Math.cos(rz), sZ = Math.sin(rz);

    // Projection perspective de chaque sommet
    var proj = verts.map(function(v) {
      var x = v[0], y = v[1], z = v[2];
      var x1 =  x*cY + z*sY, z1 = -x*sY + z*cY;
      var y2 =  y*cX - z1*sX, z2 = y*sX + z1*cX;
      var x3 =  x1*cZ - y2*sZ, y3 = x1*sZ + y2*cZ;
      var fov = 3.0, s = fov / (fov + z2 + 0.1);
      return [x3*r*s + cx, y3*r*s + cy, z2];
    });

    // Tri fond → avant
    var sorted = edges.slice().sort(function(a, b) {
      return ((proj[a[0]][2]+proj[a[1]][2])/2) - ((proj[b[0]][2]+proj[b[1]][2])/2);
    });

    // Arêtes
    for (var i = 0; i < sorted.length; i++) {
      var e = sorted[i];
      var pa = proj[e[0]], pb = proj[e[1]];
      var depth = ((pa[2]+pb[2])/2 + 1) / 2;
      ctx.beginPath();
      ctx.moveTo(pa[0], pa[1]);
      ctx.lineTo(pb[0], pb[1]);
      ctx.strokeStyle = 'rgba(0,188,212,'+(0.05 + depth*0.75).toFixed(2)+')';
      ctx.lineWidth   = 0.3 + depth * 0.9;
      ctx.stroke();
    }

    // 12 sommets pentagones (icosaèdre original)
    for (var j = 0; j < 12; j++) {
      var p = proj[j];
      var d = (p[2]+1)/2;
      if (d < 0.15) continue;
      ctx.beginPath();
      ctx.arc(p[0], p[1], 1.0 + d*2.0, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,188,212,'+(d*0.85).toFixed(2)+')';
      ctx.fill();
    }

    raf = requestAnimationFrame(frame);
  }

  window.addEventListener('resize', resize);
  resize();
  frame();

  // Appelé automatiquement quand Flutter prend la main (optionnel — Flutter recouvre le canvas)
  window._hideSplash = function () {
    active = false;
    if (raf) cancelAnimationFrame(raf);
    var el = document.getElementById('goldberg-splash');
    var ui = document.getElementById('splash-ui');
    if (el) { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; }
    if (ui) { ui.style.opacity = '0'; ui.style.transition = 'opacity .3s'; }
  };
})();
</script>
</body>
</html>
